name: kid_security
description: Family security - Parental GPS tracking app with platform-adaptive maps.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Maps
  google_maps_flutter: ^2.6.1
  google_maps_flutter_android: ^2.14.5
  apple_maps_flutter: ^1.3.0

  # Real GPS
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # API
  http: ^1.2.2
  shared_preferences: ^2.3.2

  # Firebase
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.1

  # WebRTC audio monitoring
  flutter_webrtc: ^0.12.4

  # Utilities
  intl: ^0.20.2
  equatable: ^2.0.5

  # Battery
  battery_plus: ^6.0.1

  # Runtime permissions (background location, battery opt, etc.)
  permission_handler: ^11.3.1

  # Image picker for avatars
  image_picker: ^1.0.7
  flutter_local_notifications: ^17.2.4
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  record: ^5.1.2
  web: ^1.1.1
  flutter_background_service: ^5.0.12
  flutter_background_service_android: ^6.2.7
  kid_security_android_bridge:
    path: packages/kid_security_android_bridge
  share_plus: ^13.0.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_lints: ^3.0.2
  flutter_test:
    sdk: flutter

dependency_overrides:
  record_linux:
    path: third_party/record_linux

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
