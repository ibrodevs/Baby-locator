name: kid_security
description: Kid Security - Parental GPS tracking app with platform-adaptive maps.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Maps
  google_maps_flutter: ^2.6.1
  apple_maps_flutter: ^1.3.0

  # Real GPS
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # API
  http: ^1.2.2
  shared_preferences: ^2.3.2

  # Utilities
  intl: ^0.19.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_lints: ^3.0.2
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
